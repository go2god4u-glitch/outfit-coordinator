<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbcfe8"/>
      <stop offset="55%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="face" cx="45%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fae3c8"/>
      <stop offset="60%" stop-color="#f4d4b3"/>
      <stop offset="100%" stop-color="#d6a87f"/>
    </radialGradient>
    <linearGradient id="hairG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2418"/>
      <stop offset="100%" stop-color="#1a0e08"/>
    </linearGradient>
    <linearGradient id="jacketG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
  </defs>

  <!-- Background — full bleed; iOS rounds corners. -->
  <rect width="180" height="180" rx="38" ry="38" fill="url(#bg)"/>
  <rect width="180" height="180" rx="38" ry="38" fill="url(#glow)"/>

  <!-- Floor shadow for depth -->
  <ellipse cx="90" cy="158" rx="38" ry="4" fill="rgba(0,0,0,0.18)"/>

  <!-- Jacket / shoulders — purple to pop against pink bg -->
  <path d="M 50 158 C 50 132 64 116 86 112 L 94 112 C 116 116 130 132 130 158 Z"
        fill="url(#jacketG)" stroke="rgba(0,0,0,0.18)" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Jacket lapels -->
  <path d="M 86 112 L 80 132 L 90 142 L 90 116 Z" fill="rgba(255,255,255,0.85)" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>
  <path d="M 94 112 L 100 132 L 90 142 L 90 116 Z" fill="rgba(255,255,255,0.85)" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>
  <!-- Inner shadow on jacket -->
  <path d="M 50 158 C 50 132 60 118 80 114 L 80 158 Z" fill="rgba(0,0,0,0.18)"/>

  <!-- Neck -->
  <rect x="84" y="100" width="12" height="16" rx="2" fill="url(#face)"/>

  <!-- Head -->
  <circle cx="90" cy="78" r="32" fill="url(#face)"/>

  <!-- Hair — slicked back with a soft top puff -->
  <path d="M 60 72 Q 56 44 90 42 Q 124 44 120 72 Q 118 60 110 54 Q 90 48 70 54 Q 62 60 60 72 Z"
        fill="url(#hairG)"/>
  <!-- Hair shine highlight -->
  <ellipse cx="90" cy="50" rx="18" ry="3" fill="rgba(122,74,42,0.6)"/>

  <!-- Cheek blush -->
  <ellipse cx="74" cy="86" rx="6.5" ry="4" fill="rgba(255,150,150,0.55)"/>
  <ellipse cx="106" cy="86" rx="6.5" ry="4" fill="rgba(255,150,150,0.55)"/>

  <!-- Eyes — round, with sparkle -->
  <circle cx="79" cy="80" r="3.4" fill="#1a1208"/>
  <circle cx="101" cy="80" r="3.4" fill="#1a1208"/>
  <circle cx="80.2" cy="78.8" r="1" fill="white"/>
  <circle cx="102.2" cy="78.8" r="1" fill="white"/>

  <!-- Cute smile -->
  <path d="M 84 92 Q 90 96 96 92"
        fill="none" stroke="rgba(160,80,80,0.95)" stroke-width="2" stroke-linecap="round"/>

  <!-- Tiny color palette dots in the corner — color-picker hint -->
  <circle cx="32" cy="32" r="6" fill="#fde68a" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="148" cy="32" r="6" fill="#bae6fd" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
</svg>
