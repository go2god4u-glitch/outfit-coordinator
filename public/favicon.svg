<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="55%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- iOS prefers a full-bleed square; the system rounds the corners. -->
  <rect width="180" height="180" rx="38" ry="38" fill="url(#bg)"/>
  <rect width="180" height="180" rx="38" ry="38" fill="url(#shine)"/>

  <!-- Big C monogram -->
  <path d="M 132 60 A 36 36 0 1 0 132 120"
        fill="none" stroke="white" stroke-width="14"
        stroke-linecap="round"/>

  <!-- Period to match the wordmark "Coordi." -->
  <circle cx="138" cy="120" r="9" fill="white"/>

  <!-- Three palette dots evoking the color picker -->
  <circle cx="42" cy="138" r="7" fill="#fef3c7"/>
  <circle cx="62" cy="146" r="7" fill="#fda4af"/>
  <circle cx="82" cy="148" r="7" fill="#bae6fd"/>
</svg>
