<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background — full bleed; iOS rounds corners. -->
  <rect width="180" height="180" rx="38" ry="38" fill="url(#bg)"/>
  <rect width="180" height="180" rx="38" ry="38" fill="url(#glow)"/>

  <!-- Modern hanger silhouette -->
  <g fill="none" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <!-- Hook -->
    <path d="M 90 56 Q 90 40 102 40 Q 113 40 113 51"/>
    <!-- Triangular body -->
    <path d="M 90 60 L 48 96 L 132 96 Z"/>
    <!-- Bottom bar -->
    <line x1="48" y1="96" x2="132" y2="96"/>
  </g>

  <!-- Color palette dots at the base, evoking the picker -->
  <g>
    <circle cx="62" cy="138" r="11" fill="#fde68a" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    <circle cx="90" cy="144" r="11" fill="#fda4af" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    <circle cx="118" cy="138" r="11" fill="#bae6fd" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  </g>
</svg>
